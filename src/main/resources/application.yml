spring:
  application:
    name: volt-connect-backend

  # ── Database (Supabase PostgreSQL) ──────────────────────────────────────────
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME:postgres}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── Redis ────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # ── Mail (optional — configure if email notifications are needed) ────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiry: ${JWT_EXPIRY:3600000}           # 1 hour in milliseconds (default)
  refresh-expiry: ${JWT_REFRESH_EXPIRY:2592000000}  # 30 days in milliseconds (default)

# ── Firebase ─────────────────────────────────────────────────────────────────
firebase:
  project-id: ${FIREBASE_PROJECT_ID}
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  credentials-json: ${FIREBASE_CREDENTIALS_JSON:}

# ── Razorpay ─────────────────────────────────────────────────────────────────
razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  secret: ${RAZORPAY_SECRET}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ── SpringDoc / Swagger UI ───────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.voltconnect: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
